<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Pix42</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
    }

    h1 {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .tagline {
      color: #666;
      font-size: 13px;
      margin-bottom: 32px;
    }

    .version-badge {
      display: inline-block;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 20px;
      color: #5a9fd4;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 14px;
      margin-bottom: 32px;
    }

    .download-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 32px;
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #2a82da;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }

    .download-btn:hover { background: #3a92ea; }
    .download-btn:active { background: #1a72ca; }

    .download-btn .platform {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .download-btn .size {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.75;
    }

    .notes {
      border-top: 1px solid #2a2a2a;
      padding-top: 24px;
      text-align: left;
    }

    .notes h2 {
      color: #aaa;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .notes ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .notes li {
      font-size: 13px;
      color: #888;
      padding-left: 16px;
      position: relative;
    }

    .notes li::before {
      content: "–";
      position: absolute;
      left: 0;
      color: #555;
    }

    footer {
      margin-top: 32px;
      color: #444;
      font-size: 11px;
    }

    footer a { color: #5a9fd4; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pix42</h1>
    <p class="tagline">A fast, modern image viewer</p>

    <div class="version-badge" id="versionBadge">Version 0.1.0</div>

    <div class="download-grid">
      <a class="download-btn" href="#" id="dlWindows">
        <span class="platform">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/>
          </svg>
          Windows (installer)
        </span>
        <span class="size">.exe</span>
      </a>
    </div>

    <div class="notes">
      <h2>Release notes</h2>
      <ul id="changelogList">
        <li>Initial release</li>
      </ul>
    </div>
  </div>

  <footer>
    &copy; 2026 De Martin Davide &mdash;
    <a href="https://www.demahub.com">demahub.com</a>
  </footer>

  <script>
    // Fetch version.json to populate dynamic content
    fetch('/pix42/version.json')
      .then(r => r.json())
      .then(data => {
        if (data.version) {
          document.getElementById('versionBadge').textContent = 'Version ' + data.version;
        }
        if (data.changelog) {
          const list = document.getElementById('changelogList');
          list.innerHTML = '';
          const items = Array.isArray(data.changelog) ? data.changelog : [data.changelog];
          items.forEach(item => {
            const li = document.createElement('li');
            li.textContent = item;
            list.appendChild(li);
          });
        }
      })
      .catch(() => {});
  </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- original small rect -->
  <rect x="3" y="3" width="10" height="10" rx="1" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- diagonal double-headed arrow toward bottom-right -->
  <line x1="13" y1="13" x2="20" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <!-- arrowhead at bottom-right -->
  <polyline points="15,20 20,20 20,15" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
